name: 股癌 AI 每日投資筆記

on:
  schedule:
    # 每天 台灣時間 早上 10:00（UTC 02:00）執行
    - cron: "0 2 * * *"
  workflow_dispatch:  # 允許手動觸發（測試用）

jobs:
  digest:
    name: Digest Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Gemini 直接分析音檔，無需 Whisper 轉錄

    steps:
      # ── 1. 取得程式碼 ─────────────────────────────────────────
      - name: ✅ Checkout 程式碼
        uses: actions/checkout@v4

      # ── 2. 安裝 Python ────────────────────────────────────────
      - name: 🐍 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. 安裝 Python 套件 ───────────────────────────────────
      - name: 📦 安裝 Python 套件
        run: pip install -r requirements.txt

      # ── 4. 執行主程式 ─────────────────────────────────────────
      - name: 🚀 執行 Digest Pipeline
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python main.py

      # ── 5. 儲存狀態（記錄已處理的集數）──────────────────────
      - name: 💾 提交狀態更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git push
        # 即使主程式失敗也嘗試儲存狀態
        if: always()
