name: 🧪 測試 Pipeline（跳過轉錄）

on:
  workflow_dispatch:  # 只手動觸發，不自動排程

jobs:
  test:
    name: 測試 Gemini + Email + LINE
    runs-on: ubuntu-latest
    timeout-minutes: 10  # 測試很快，10 分鐘夠了

    steps:
      - name: ✅ Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 📦 安裝套件
        run: pip install -r requirements.txt

      - name: 🤖 測試 Gemini 分析
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python test_pipeline.py --step analyze

      - name: 🎨 測試 HTML 渲染
        run: python test_pipeline.py --step render --use-cached

      - name: 📧 測試 Email 發送
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python test_pipeline.py --step email --use-cached

      - name: 📱 測試 LINE 發送
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python test_pipeline.py --step line --use-cached

      - name: 📄 上傳 HTML 預覽
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-output-html
          path: test_output.html
          retention-days: 3
